{% extends 'base.html' %}

{% block content %}
<h2 style="text-align:center;">Register Now</h2>

<form method="POST" onsubmit="return validateForm()">
    
    <label><i class="ri-user-line"></i> Full Name</label>
    <input type="text" name="name" required>

    <label><i class="ri-mail-line"></i> Email</label>
    <input type="email" name="email" required>

    <label><i class="ri-phone-line"></i> Phone</label>
    <input type="text" name="phone" required>

    <label><i class="ri-calendar-line"></i> Select Event</label>
    <select name="event">
        {% for event in events %}
        <option>{{ event.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Register</button>
</form>
{% endblock %}
