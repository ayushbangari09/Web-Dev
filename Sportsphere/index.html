<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsMart - All Sports Gear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/script.js" defer></script>
</head>
<body class="bg-gray-50 font-sans">
  <!-- Navbar -->
  <nav class="bg-green-600 text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2 text-3xl font-bold">
        <i class="fas fa-football"></i>
        <span>SportsMart</span>
      </div>
      <div class="flex items-center gap-8">
        <button onclick="showCart()" class="relative flex items-center gap-2 hover:scale-110 transition">
          <i class="fas fa-shopping-cart text-2xl"></i>
          <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="bg-gradient-to-r from-green-700 to-emerald-600 text-white py-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-6xl font-bold mb-4">All Sports. One Store.</h1>
      <p class="text-2xl mb-8">Cricket • Football • Fitness • Tennis &amp; more</p>
      <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" 
              class="bg-white text-green-700 px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition">
        Shop Now →
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-wrap gap-3" id="category-filters">
      <!-- JS will fill buttons -->
    </div>
  </div>

  <!-- Products -->
  <div id="products" class="max-w-7xl mx-auto px-6 pb-16">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-4xl font-bold">Featured Sports Gear</h2>
      <input id="search-input" type="text" placeholder="Search products..." 
             class="border-2 border-gray-300 rounded-full px-6 py-3 w-80 focus:outline-none focus:border-green-500">
    </div>
    
    <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
      <!-- JS will render cards here -->
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">
    <div class="bg-white rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-hidden">
      <div class="p-6 border-b flex justify-between items-center">
        <h3 class="text-3xl font-bold">Your Cart</h3>
        <button onclick="hideCart()" class="text-4xl text-gray-400 hover:text-black">×</button>
      </div>
      
      <div id="cart-items" class="p-6 overflow-auto max-h-[60vh]">
        <!-- JS fills cart items -->
      </div>
      
      <div class="p-6 border-t bg-gray-50">
        <div class="flex justify-between text-2xl font-bold mb-6">
          <span>Total</span>
          <span id="cart-total">₹0</span>
        </div>
        <button onclick="checkout()" 
                class="w-full bg-green-600 hover:bg-green-700 text-white py-6 rounded-2xl text-2xl font-bold transition">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>

  <script>
    // Tailwind script already included via CDN
  </script>
</body>
</html>
