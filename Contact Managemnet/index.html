{% extends 'base.html' %}

{% block content %}

<h3>All Contacts</h3>

<form method="GET" class="search-box">
    <input type="text" name="search" placeholder="Search by name or phone">
    <button type="submit">Search</button>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for contact in contacts %}
    <tr>
        <td>{{ contact.name }}</td>
        <td>{{ contact.phone }}</td>
        <td>{{ contact.email }}</td>
        <td>
            <a href="/edit/{{ contact.id }}" class="action-btn edit">Edit</a>
            <a href="/delete/{{ contact.id }}" class="action-btn delete">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
